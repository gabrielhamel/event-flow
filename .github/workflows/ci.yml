name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

env:
  DO_NOT_TRACK: 1
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  ci:
    name: CI
    timeout-minutes: 15
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.affected.outputs.ui }}
      api: ${{ steps.affected.outputs.api }}
      docker-compose-changed: ${{ steps.docker-compose.outputs.changed }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 25.8.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache dprint plugins
        uses: actions/cache@v4
        with:
          path: ~/.cache/dprint
          key: dprint-${{ hashFiles('dprint.json') }}

      - name: CI
        env:
          TURBO_SCM_BASE: ${{ github.event.before || 'HEAD~1' }}
        run: pnpm exec turbo run ci --affected

      - name: Detect affected packages
        id: affected
        env:
          TURBO_SCM_BASE: ${{ github.event.before || 'HEAD~1' }}
        run: |
          AFFECTED=$(pnpm exec turbo ls --affected --output=json)
          echo "Affected packages: $AFFECTED"

          if echo "$AFFECTED" | jq -e '.packages.items[] | select(.name == "@repo/ui")' > /dev/null 2>&1; then
            echo "ui=true" >> "$GITHUB_OUTPUT"
          fi

          if echo "$AFFECTED" | jq -e '.packages.items[] | select(.name == "@repo/api")' > /dev/null 2>&1; then
            echo "api=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect docker-compose.yml changes
        id: docker-compose
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^docker-compose\.yml$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build-ui:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.ci.outputs.ui == 'true'
    name: Build ui
    timeout-minutes: 15
    environment: Production
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/gabrielhamel/ddd-lab/ui

      - name: Build & push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/ui/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-api:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.ci.outputs.api == 'true'
    name: Build api
    timeout-minutes: 15
    environment: Production
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/gabrielhamel/ddd-lab/api

      - name: Build & push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-deployment:
    if: always() && ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && (needs.ci.outputs.api == 'true' || needs.ci.outputs.ui == 'true' || needs.ci.outputs.docker-compose-changed == 'true') && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'))
    name: Trigger deployment
    timeout-minutes: 15
    environment: Production
    runs-on: ubuntu-latest
    needs: [ci, build-api, build-ui]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Trigger deployment
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_USER: ${{ secrets.PORTAINER_USER }}
          PORTAINER_PASSWORD: ${{ secrets.PORTAINER_PASSWORD }}
          STACK_ID: ${{ secrets.PORTAINER_STACK_ID }}
          ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "1️⃣ Exchange API key for a JWT"

          JWT=$(curl -s -X POST "$PORTAINER_URL/api/auth" \
            -H "Content-Type: application/json" \
            -d "{\"Username\":\"$PORTAINER_USER\",\"Password\":\"$PORTAINER_PASSWORD\"}" \
            | jq -r '.jwt')

          if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then
            echo "Failed to get JWT from Portainer"
            exit 1
          fi

          echo "✅ JWT obtained successfully"

          echo "2️⃣ Trigger stack update"

          STACK_FILE_CONTENT=$(cat docker-compose.yml)

          curl -s -X PUT \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            "$PORTAINER_URL/api/stacks/$STACK_ID?endpointId=$ENDPOINT_ID" \
            -d "$(jq -n --arg content "$STACK_FILE_CONTENT" --arg database_url "$DATABASE_URL" '{"Env": [{ "name": "DATABASE_URL", "value": $database_url }], "Prune": true, "RepullImageAndRedeploy": true, "StackFileContent": $content}')" \
            | jq
