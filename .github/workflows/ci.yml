name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

env:
  DO_NOT_TRACK: 1
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  ci:
    name: CI
    timeout-minutes: 15
    runs-on: ubuntu-latest
    outputs:
      event-storming-ui: ${{ steps.affected.outputs.event-storming-ui }}
      event-storming-api: ${{ steps.affected.outputs.event-storming-api }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache dprint plugins
        uses: actions/cache@v4
        with:
          path: ~/.cache/dprint
          key: dprint-${{ hashFiles('dprint.json') }}

      - name: CI
        run: pnpm exec turbo run ci --affected

      - name: Detect affected packages
        id: affected
        run: |
          AFFECTED=$(pnpm exec turbo ls --affected --output=json)
          echo "Affected packages: $AFFECTED"

          if echo "$AFFECTED" | jq -e '.packages.items[] | select(.name == "@repo/event-storming-ui")' > /dev/null 2>&1; then
            echo "event-storming-ui=true" >> "$GITHUB_OUTPUT"
          fi

          if echo "$AFFECTED" | jq -e '.packages.items[] | select(.name == "@repo/event-storming-api")' > /dev/null 2>&1; then
            echo "event-storming-api=true" >> "$GITHUB_OUTPUT"
          fi

  build-event-storming-ui:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.ci.outputs.event-storming-ui == 'true'
    name: Build event storming ui
    timeout-minutes: 15
    environment: Production
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/gabrielhamel/ddd-lab/event-storming/ui

      - name: Build & push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: event-storming/ui/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-event-storming-api:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.ci.outputs.event-storming-api == 'true'
    name: Build event storming api
    timeout-minutes: 15
    environment: Production
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/gabrielhamel/ddd-lab/event-storming/api

      - name: Build & push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: event-storming/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  trigger-deployment:
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && (needs.ci.outputs.event-storming-api == 'true' || needs.ci.outputs.event-storming-ui == 'true') && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    name: Trigger deployment
    timeout-minutes: 15
    environment: Production
    runs-on: ubuntu-latest
    needs: [ci, build-event-storming-api, build-event-storming-ui]
    steps:
      - name: Trigger deployment
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          STACK_ID: ${{ secrets.PORTAINER_STACK_ID }}
          ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
        run: |
          curl -X PUT \
            -H "Authorization: Bearer $PORTAINER_API_KEY" \
            -H "Content-Type: application/json" \
            "$PORTAINER_URL/api/stacks/$STACK_ID/?endpointId=$ENDPOINT_ID" \
            -d '{"Prune": true, "RepullImageAndRedeploy": true}'
