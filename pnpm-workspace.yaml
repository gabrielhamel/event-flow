packages:
  - "apps/*"
  - "packages/*"

injectWorkspacePackages: true
syncInjectedDepsAfterScripts:
  - build

catalog:
  better-auth: ^1.5.6
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
