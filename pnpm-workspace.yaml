packages:
  - "apps/*"
  - "packages/*"
  - "tools/*"

catalog:
  "@hocuspocus/provider": ^3.4.4
  "@hocuspocus/server": ^3.4.4
  "@hocuspocus/extension-database": ^3.4.4
  "@prisma/adapter-pg": ^7.7.0
  "@prisma/client": ^7.7.0
  "@tanstack/react-router": ^1.168.18
  "@tanstack/router-plugin": ^1.167.18
  "@types/node": ^25.6.0
  auth: ^1.6.2
  better-auth: ^1.6.2
  "@orpc/contract": ^1.13.14
  "@orpc/server": ^1.13.14
  "@orpc/client": ^1.13.14
  "@orpc/tanstack-query": ^1.13.14
  "prisma": ^7.7.0
  tsx: ^4.21.0
  typescript: ^6.0.2
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  zod: ^4.3.6

injectWorkspacePackages: true

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
syncInjectedDepsAfterScripts:
  - build
