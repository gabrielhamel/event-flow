services:
  api:
    image: ghcr.io/gabrielhamel/ddd-lab/api:main
    ports:
      - "127.0.0.1:15080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: "always"

  ui:
    image: ghcr.io/gabrielhamel/ddd-lab/ui:main
    ports:
      - "127.0.0.1:15081:80"
    restart: "always"
