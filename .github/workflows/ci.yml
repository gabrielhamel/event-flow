name: CI
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  DO_NOT_TRACK: 1
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  ci:
    name: CI
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: CI
        run: pnpm run ci

  deploy-event-storming-ui:
    name: Deploy event storming ui
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: eu-west-3

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push event storming ui container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: event-storming/ui/Dockerfile
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/ddd-lab/event-storming/ui:${{ github.sha }}
          cache-from: type=gha,scope=event-storming-ui
          cache-to: type=gha,mode=max,scope=event-storming-ui

  deploy-event-storming-api:
    name: Deploy event storming api
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: eu-west-3

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push event storming api container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: event-storming/api/Dockerfile
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/ddd-lab/event-storming/api:${{ github.sha }}
          cache-from: type=gha,scope=event-storming-api
          cache-to: type=gha,mode=max,scope=event-storming-api
