name: CI
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  DO_NOT_TRACK: 1
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  ci:
    name: CI
    timeout-minutes: 15
    runs-on: ubuntu-latest
    outputs:
      event-storming-ui: ${{ steps.affected.outputs.event-storming-ui }}
      event-storming-api: ${{ steps.affected.outputs.event-storming-api }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache dprint plugins
        uses: actions/cache@v4
        with:
          path: ~/.cache/dprint
          key: dprint-${{ hashFiles('dprint.json') }}

      - name: CI
        run: pnpm exec turbo run ci --affected

      - name: Detect affected packages
        id: affected
        run: |
          AFFECTED=$(pnpm exec turbo ls --affected --output=json)
          echo "Affected packages: $AFFECTED"

          if echo "$AFFECTED" | jq -e '.packages.items[] | select(.name == "@repo/event-storming-ui")' > /dev/null 2>&1; then
            echo "event-storming-ui=true" >> "$GITHUB_OUTPUT"
          fi

          if echo "$AFFECTED" | jq -e '.packages.items[] | select(.name == "@repo/event-storming-api")' > /dev/null 2>&1; then
            echo "event-storming-api=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-event-storming-ui:
    name: Deploy event storming ui
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci.outputs.event-storming-ui == 'true'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: eu-west-3

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push event storming ui container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: event-storming/ui/Dockerfile
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/ddd-lab/event-storming/ui:latest
          cache-from: type=gha,scope=event-storming-ui
          cache-to: type=gha,mode=max,scope=event-storming-ui

  deploy-event-storming-api:
    name: Deploy event storming api
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci.outputs.event-storming-api == 'true'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: eu-west-3

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push event storming api container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: event-storming/api/Dockerfile
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/ddd-lab/event-storming/api:latest
          cache-from: type=gha,scope=event-storming-api
          cache-to: type=gha,mode=max,scope=event-storming-api
